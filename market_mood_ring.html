<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Market Mood Ring</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-height: 100vh;
        }
        
        h1 {
            color: #333;
            font-size: 32px;
            margin: 30px 0 10px 0;
        }
        
        .blob-container {
            width: 400px;
            height: 400px;
            position: relative;
        }
        
        .sentiment-info {
            text-align: center;
            color: #333;
            margin-top: -20px;
        }
        
        .current-mood {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .mood-stats {
            font-size: 16px;
            line-height: 1.5;
        }
        
        .update-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .update-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Financial Market Mood Ring</h1>
    
    <div class="blob-container" id="blobContainer"></div>
    
    <div class="sentiment-info">
        <div class="current-mood" id="currentMood">Market Mood: MIXED</div>
        <div class="mood-stats" id="moodStats">
            🐂 Bullish: 0% | 🐻 Bearish: 10% | 😐 Neutral: 90%
        </div>
    </div>
    
    <button class="update-btn" onclick="updateMood()">Update Market Mood</button>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        let currentSentiment = {
            bullish: 0,
            bearish: 10,
            neutral: 90,
            overall: 'MIXED'
        };
        
        // Three.js setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 400 / 400, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(400, 400);
        renderer.setClearColor(0xffffff, 0); // Transparent background
        document.getElementById('blobContainer').appendChild(renderer.domElement);

        // Create blob geometry
        const geometry = new THREE.SphereGeometry(1.5, 64, 64);
        
        // Shader for the blob
        const vertexShader = `
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float time;
            
            void main() {
                vPosition = position;
                vNormal = normal;
                
                // Add gentle noise for blob deformation
                vec3 pos = position;
                float noise = sin(pos.x * 2.0 + time) * 0.1 + 
                             cos(pos.y * 3.0 + time * 0.8) * 0.08 + 
                             sin(pos.z * 2.5 + time * 1.2) * 0.06;
                pos += normal * noise;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;
        
        const fragmentShader = `
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float time;
            uniform vec3 bullishColor;
            uniform vec3 bearishColor;
            uniform vec3 neutralColor;
            uniform float bullishAmount;
            uniform float bearishAmount;
            uniform float neutralAmount;
            
            // Random function for grain
            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
            }
            
            // Noise function
            float noise(vec2 st) {
                vec2 i = floor(st);
                vec2 f = fract(st);
                
                float a = random(i);
                float b = random(i + vec2(1.0, 0.0));
                float c = random(i + vec2(0.0, 1.0));
                float d = random(i + vec2(1.0, 1.0));
                
                vec2 u = f * f * (3.0 - 2.0 * f);
                
                return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
            }
            
            void main() {
                // Create distance from center for gradient
                float dist = length(vPosition) / 1.5;
                
                // Add some movement to the gradient
                float movement = sin(time * 0.5 + vPosition.x * 0.5) * 0.3 + 
                                cos(time * 0.3 + vPosition.y * 0.7) * 0.2;
                dist += movement;
                
                // Add grain/noise
                vec2 grainCoord = vPosition.xy * 600.0 + time * 0.1;
                float grain = noise(grainCoord) * 0.05;
                
                // Mix colors based on sentiment
                vec3 baseColor = bullishColor * (bullishAmount / 100.0) + 
                                bearishColor * (bearishAmount / 100.0) + 
                                neutralColor * (neutralAmount / 100.0);
                
                // Create gradient variation
                vec3 color = baseColor;
                if (dist < 0.5) {
                    color = mix(baseColor, baseColor * 1.3, dist * 2.0);
                } else {
                    color = mix(baseColor * 1.3, baseColor * 0.7, (dist - 0.5) * 2.0);
                }
                
                // Apply grain
                color += grain;
                
                // Add glow
                float fresnel = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
                color += baseColor * fresnel * 0.2;
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;
        
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                time: { value: 0 },
                bullishColor: { value: new THREE.Vector3(0.18, 0.8, 0.44) }, // Green
                bearishColor: { value: new THREE.Vector3(0.91, 0.3, 0.24) }, // Red  
                neutralColor: { value: new THREE.Vector3(0.58, 0.65, 0.65) }, // Gray
                bullishAmount: { value: 0 },
                bearishAmount: { value: 10 },
                neutralAmount: { value: 90 }
            }
        });
        
        const blob = new THREE.Mesh(geometry, material);
        scene.add(blob);
        
        camera.position.z = 3;
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            material.uniforms.time.value = time;
            
            // Gentle animation
            blob.rotation.y = Math.sin(time * 0.3) * 0.2;
            blob.rotation.x = Math.cos(time * 0.2) * 0.1;
            blob.position.y = Math.sin(time * 0.4) * 0.1;
            blob.position.x = Math.cos(time * 0.6) * 0.05;
            
            renderer.render(scene, camera);
        }
        
        function updateMoodColors() {
            const { bullish, bearish, neutral } = currentSentiment;
            
            // Update shader uniforms
            material.uniforms.bullishAmount.value = bullish;
            material.uniforms.bearishAmount.value = bearish;
            material.uniforms.neutralAmount.value = neutral;
            
            // Update text display
            document.getElementById('currentMood').textContent = `Market Mood: ${currentSentiment.overall}`;
            document.getElementById('moodStats').textContent = 
                `🐂 Bullish: ${bullish}% | 🐻 Bearish: ${bearish}% | 😐 Neutral: ${neutral}%`;
        }
        
        function updateMood() {
            // Demo different moods
            const moods = [
                { bullish: 70, bearish: 20, neutral: 10, overall: 'BULLISH' },
                { bullish: 15, bearish: 75, neutral: 10, overall: 'BEARISH' },
                { bullish: 30, bearish: 30, neutral: 40, overall: 'MIXED' },
                { bullish: 5, bearish: 10, neutral: 85, overall: 'NEUTRAL' }
            ];
            
            currentSentiment = moods[Math.floor(Math.random() * moods.length)];
            updateMoodColors();
        }
        
        // Initialize
        updateMoodColors();
        animate();
        
        // Handle window resize if needed
        window.addEventListener('resize', () => {
            // Keep blob container size fixed for now
        });
    </script>
</body>
</html>
